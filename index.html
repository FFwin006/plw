<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>批量打开网址工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            max-width: 100%;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            height: 400px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            min-width: 120px;
        }
        #clear {
            background-color: #f44336;
        }
        button:hover {
            opacity: 0.9;
        }
        .instructions {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>批量打开网址工具</h1>
    
    <textarea id="urls" placeholder="请在此处粘贴多个网址，每行一个网址...
例如：
https://www.baidu.com
https://www.google.com
https://www.github.com"></textarea>
    
    <div class="button-container">
        <button id="openAll">批量打开</button>
        <button id="clear">清空</button>
    </div>
    
    <div class="instructions">
        <h3>使用说明：</h3>
        <ol>
            <li>在文本框中粘贴多个网址（每行一个网址）</li>
            <li>最多支持26个网址</li>
            <li>点击"批量打开"按钮</li>
            <li>浏览器会逐个打开这些网址（可能会弹出弹窗警告）</li>
            <li>请允许弹出窗口以正常使用</li>
        </ol>
    </div>
    
    <script>
        document.getElementById('openAll').addEventListener('click', function() {
            const urlsText = document.getElementById('urls').value.trim();
            if (!urlsText) {
                alert('请输入至少一个网址');
                return;
            }
            
            const urls = urlsText.split('\n').filter(url => url.trim());
            
            if (urls.length === 0) {
                alert('没有检测到有效的网址');
                return;
            }
            
            // 检查网址数量是否超过26个
            if (urls.length > 26) {
                alert('最多只能批量打开26个网址，请减少网址数量');
                return;
            }
            
            // 确认是否真的要打开多个网址
            if (confirm(`即将打开 ${urls.length} 个网址，确定继续吗？`)) {
                urls.forEach(url => {
                    // 确保网址有协议前缀
                    let finalUrl = url.trim();
                    if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                        finalUrl = 'https://' + finalUrl;
                    }
                    
                    // 在新标签页中打开
                    window.open(finalUrl, '_blank');
                });
            }
        });
        
        document.getElementById('clear').addEventListener('click', function() {
            document.getElementById('urls').value = '';
        });
    </script>
</body>
</html>
